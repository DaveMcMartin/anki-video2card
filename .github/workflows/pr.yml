name: PR Build Check

on:
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl1-mesa-dev libx11-dev libxext-dev libxi-dev libxrandr-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev libmpv-dev libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev libwebp-dev pkg-config libmecab-dev

      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: brew install mpv ffmpeg webp mecab mecab-ipadic

      - name: Install Windows Dependencies
        if: runner.os == 'Windows'
        run: |
          vcpkg install mpv:x64-windows ffmpeg:x64-windows libwebp:x64-windows
          vcpkg integrate install

      - name: Configure CMake
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release
